name: IT Enablement Platform — DevSecOps Pipeline

# SIMPLE EXPLANATION (like you're in school):
# This pipeline is like a teacher checking your homework before submitting it.
# Every time you push code (submit homework), the teacher automatically:
# 1. Checks for spelling mistakes (linting)
# 2. Runs tests to make sure the code works
# 3. Scans for security issues
# 4. Deploys to the right environment with approval for production

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  AWS_REGION: ap-southeast-1
  PYTHON_VERSION: "3.11"
  PROJECT_NAME: it-enablement-data-platform

jobs:

  # ── JOB 1: CODE QUALITY ──────────────────────────────────────────────────────
  # Like a spell checker — finds mistakes before anyone else sees them
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install flake8 black isort bandit pylint

      - name: Check code formatting with Black
        # Black = auto-formatter. Like making sure all your writing is neat
        run: black --check scripts/ monitoring/

      - name: Check import ordering with isort
        # isort = checks that import statements are in the right order
        run: isort --check-only scripts/ monitoring/

      - name: Lint with flake8
        # flake8 = checks for common coding mistakes
        run: |
          flake8 scripts/ monitoring/ \
            --max-line-length=120 \
            --ignore=E501,W503 \
            --statistics

      - name: Summary
        run: echo "✅ Code quality checks passed!"


  # ── JOB 2: SECURITY SCAN ────────────────────────────────────────────────────
  # Like a security guard checking your bag before entering school
  # We check for passwords left in code, security vulnerabilities etc.
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit (security scanner)
        run: pip install bandit

      - name: Run Bandit security scan
        # Bandit scans Python code for security issues
        # Like checking your essay for any rule violations
        run: |
          bandit -r scripts/ monitoring/ \
            -ll \
            -f json \
            -o bandit-report.json || true

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: bandit-report.json

      - name: Check for secrets in code
        # Make sure no passwords or API keys are accidentally committed
        # Like making sure you didn't accidentally include exam answers in your homework
        run: |
          if grep -rE "(password|secret|api_key|private_key)\s*=\s*['\"][^'\"]{8,}" scripts/ monitoring/; then
            echo "❌ Possible hardcoded secrets found!"
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Scan Terraform for misconfigurations
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform/
          soft_fail: true


  # ── JOB 3: UNIT TESTS ────────────────────────────────────────────────────────
  # Like a teacher running practice exam to check you understand the material
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [code-quality]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run unit tests with coverage
        run: |
          pytest tests/ \
            --cov=scripts \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ── JOB 4: TERRAFORM VALIDATE ────────────────────────────────────────────────
  # Like checking your architecture drawing is correct before building
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.0"

      - name: Terraform Format Check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=terraform validate

      - name: Summary
        run: echo "✅ Terraform configuration is valid!"


  # ── JOB 5: DEPLOY TO DEV ─────────────────────────────────────────────────────
  # Automatically deploy to dev environment on every push to develop branch
  # Like submitting your rough draft for the teacher to review
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, unit-tests, terraform-validate]
    if: github.ref == 'refs/heads/develop'
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Terraform to DEV
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var="environment=dev" \
            -var="aws_region=${{ env.AWS_REGION }}"

      - name: Deploy ETL scripts to S3
        run: |
          aws s3 sync scripts/ s3://${{ env.PROJECT_NAME }}-dev-data-lake/scripts/

      - name: Run smoke test
        run: |
          echo "Running smoke tests against DEV environment..."
          python scripts/etl_pipeline.py --dry-run --env dev

      - name: Deployment summary
        run: |
          echo "## ✅ DEV Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | DEV |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY


  # ── JOB 6: DEPLOY TO PRODUCTION ──────────────────────────────────────────────
  # Production requires manual approval before deploying
  # Like needing the principal's signature before a major school event
  deploy-prod:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, unit-tests, terraform-validate]
    if: github.ref == 'refs/heads/main'
    environment: production  # This requires manual approval in GitHub settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Terraform to PRODUCTION
        run: |
          cd terraform
          terraform init
          terraform plan -var="environment=prod" -out=tfplan
          terraform apply tfplan

      - name: Deploy ETL scripts to Production S3
        run: |
          aws s3 sync scripts/ s3://${{ env.PROJECT_NAME }}-prod-data-lake/scripts/

      - name: Verify deployment health
        run: |
          echo "Verifying production deployment health..."
          python monitoring/cloudwatch_alerts.py --verify

      - name: Deployment summary
        run: |
          echo "## 🚀 PRODUCTION Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | PRODUCTION |" >> $GITHUB_STEP_SUMMARY
          echo "| Approved by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | $(date) |" >> $GITHUB_STEP_SUMMARY
